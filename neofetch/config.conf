# Cyberpunk / Synthwave neofetch config
# Palette: hot pink 198, electric cyan 51, purple 141

print_info() {
    info title
    info underline

    info "os    " distro
    info "kernel" kernel
    info "host  " model
    info "uptime" uptime
    info "pkgs  " packages
    info "shell " shell
    info "wm    " wm
    info "term  " term
    info "cpu   " cpu
    info "gpu   " gpu
    info "memory" memory

    info cols
}


# ── Title ──
title_fqdn="off"
title_color_user="distro"
title_color_at="distro"
title_color_host="distro"


# ── Distro / kernel / uptime ──
distro_shorthand="off"
os_arch="on"
kernel_shorthand="on"
uptime_shorthand="tiny"


# ── Host ──
refresh_rate="off"


# ── Shell / DE / WM ──
shell_path="off"
shell_version="on"
de_version="on"


# ── CPU ──
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="off"
cpu_show_n=2


# ── GPU ──
gpu_brand="on"
gpu_type="all"


# ── Memory ──
memory_percent="on"
memory_unit="gib"


# ── Packages ──
package_managers="on"


# ── Disk ──
disk_show=('/')
disk_subtitle="mount"
disk_percent="on"


# ── Colors ──
# slots: 1=title/user  2=@  3=underline  4=keys  5=colon  6=info
colors=(198 51 141 198 141 51)


# ── Text style ──
bold="on"
underline_enabled="on"
underline_char="─"
separator=" "


# ── Color blocks ──
color_blocks="on"
block_range=(0 15)
block_width=3
block_height=1
col_offset="auto"


# ── Image / ASCII ──
image_backend="ascii"
ascii_distro="arch"
ascii_colors=(198 51 198 51 141 198)
ascii_bold="on"

image_loop="off"
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
crop_mode="normal"
crop_offset="center"
image_size="auto"
gap=3


# ── Misc ──
stdout="off"
