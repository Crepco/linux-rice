#? Config file for btop v. 1.x

# Name of the theme file from "$XDG_CONFIG_HOME/btop/themes" (without .theme)
color_theme = "yoake"

# Theme background is transparent — kitty's background shows through
theme_background = False

# True color (24-bit) enabled
truecolor = True

# Rounded box corners (matches rice aesthetic)
rounded_corners = True
