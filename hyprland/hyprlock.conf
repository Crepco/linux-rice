# BACKGROUND
background {
    monitor =
    path = /home/crepco/Pictures/wallpapers/wallpaper.png
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# Time-Hour
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I")</span>"
    color = rgba(226, 170, 161, 1)
    font_size = 125
    font_family = JetBrainsMono Nerd Font
    position = -80, 190
    halign = center
    valign = center
}

# Time-Minute
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%M")</span>"
    color = rgba(233, 205, 176, 1)
    font_size = 125
    font_family = JetBrainsMono Nerd Font
    position = 0, 70
    halign = center
    valign = center
}

# Day-Month-Date
label {
    monitor =
    text = cmd[update:1000] echo -e "$(date +"%d %B, %a.")"
    color = rgba(233, 205, 176, 0.9)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 20, -8
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = ⚡ $USER
    color = rgba(158, 140, 156, 0.85)
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, -220
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(226, 170, 161, 0.35)
    inner_color = rgba(32, 32, 47, 0.6)
    font_color = rgb(233, 205, 176)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text = <i><span foreground="##9e8c9c99">⚡ ACCESS DENIED ⚡</span></i>
    hide_input = false
    position = 0, -290
    halign = center
    valign = center
}
