# vim:ft=kitty

## name:     Ink Rhyme (墨韵)
## author:   Custom Theme
## license:  MIT
## blurb:    Sumi-e calligraphy palette — muted rose on dark navy slate

# The basic colors
foreground              #e8ddd8
background              #2f333f
selection_foreground    #2f333f
selection_background    #cc656f

# Cursor colors
cursor                  #cc656f
cursor_text_color       #2f333f

# URL underline color when hovering with mouse
url_color               #d4a574

# Kitty window border colors
active_border_color     #cc656f
inactive_border_color   #4a4555
bell_border_color       #d4a574

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #2f333f
active_tab_background   #cc656f
inactive_tab_foreground #c5beb8
inactive_tab_background #383c4a
tab_bar_background      #2f333f

# Colors for marks (marked text in the terminal)
mark1_foreground #2f333f
mark1_background #cc656f
mark2_foreground #2f333f
mark2_background #d4a574
mark3_foreground #2f333f
mark3_background #9b6b9e

