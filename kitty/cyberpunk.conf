# vim:ft=kitty

## name:     Yoake (夜明け)
## author:   Custom Theme
## license:  MIT
## blurb:    Twilight train palette — warm peach cloud on deep night slate

# The basic colors
foreground              #e9cdb0
background              #20202f
selection_foreground    #20202f
selection_background    #e2aaa1

# Cursor colors
cursor                  #e2aaa1
cursor_text_color       #20202f

# URL underline color when hovering with mouse
url_color               #e9cdb0

# Kitty window border colors
active_border_color     #e2aaa1
inactive_border_color   #4d4f63
bell_border_color       #e9cdb0

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #20202f
active_tab_background   #e2aaa1
inactive_tab_foreground #c5b8ab
inactive_tab_background #363849
tab_bar_background      #20202f

# Colors for marks (marked text in the terminal)
mark1_foreground #20202f
mark1_background #e2aaa1
mark2_foreground #20202f
mark2_background #e9cdb0
mark3_foreground #20202f
mark3_background #9e8c9c

# The 16 terminal colors - Yoake palette

# black
color0 #363849
color8 #4d4f63

# red (warm peach)
color1 #e2aaa1
color9 #ebbda5

# green (muted sage)
color2  #90a89c
color10 #a8bdb0

# yellow (cream gold)
color3  #e9cdb0
color11 #f0dbc2

# blue (cool slate)
color4  #7a8ca8
color12 #8fa1bc

# magenta (lavender mauve)
color5  #9e8c9c
color13 #b5a4b0

# cyan (dusty teal)
color6  #8aa0a0
color14 #a0b5b5

# white
color7  #c5b8ab
color15 #e9cdb0
