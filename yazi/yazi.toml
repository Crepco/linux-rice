# Yazi — Yoake (夜明け) configuration
# Schema follows yazi ≥ 25.5.28 ([mgr] section, %s opener templates)

[mgr]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "size"
show_hidden    = false
show_symlink   = true

[preview]
wrap            = "no"
tab_size        = 2
max_width       = 1000
max_height      = 1200
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 75
ueberzug_scale  = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
    { run = '${EDITOR:-vim} %s', desc = "$EDITOR", block = true, for = "unix" },
]
open = [
    { run = 'xdg-open %s1', desc = "Open", for = "linux" },
]
reveal = [
    { run = 'xdg-open %d1', desc = "Reveal", for = "linux" },
]
extract = [
    { run = 'ya pub extract --list %s', desc = "Extract here", for = "unix" },
]
play = [
    { run = 'xdg-open %s1', desc = "Play", for = "linux" },
    { run = 'mpv --force-window %s', orphan = true, desc = "mpv", for = "unix" },
]

[open]
rules = [
    { url = "*/", use = [ "edit", "open", "reveal" ] },
    { mime = "text/*",          use = [ "edit", "reveal" ] },
    { mime = "image/*",         use = [ "open", "reveal" ] },
    { mime = "{audio,video}/*", use = [ "play", "reveal" ] },
    { mime = "inode/{empty,x-empty}", use = [ "edit", "reveal" ] },
    { mime = "application/{json,ndjson,javascript}", use = [ "edit", "reveal" ] },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal" ] },
    { mime = "*", use = [ "open", "reveal" ] },
]
